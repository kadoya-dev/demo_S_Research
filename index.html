<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>セラーサーチ画面</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="layout">
      <section class="panel panel--gray">検索条件エリア</section>
      <section class="panel panel--gray">ソート条件エリア</section>

      <div class="actions-row">
        <button class="action-btn">ASINから取得</button>
        <button class="action-btn">CSVインポート</button>
        <button class="action-btn action-btn--nav">遷移ボタン</button>
      </div>

      <section class="list-area" aria-label="セラーリサーチ一覧">
        <table class="seller-table">
          <thead>
            <tr>
              <th>ショップ名</th>
              <th>評価</th>
              <th>メモ欄</th>
              <th>最終リサーチ日</th>
              <th>未取扱ASIN数<br />（ストック）</th>
              <th>未取扱ASIN数<br />（仕入れたことが有る）</th>
              <th>単価<br />（中央値）</th>
              <th>出品ASIN数</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><a href="#">SAKURA COOL JAPAN</a></td>
              <td>★★★☆☆</td>
              <td>💖</td>
              <td>2025/11/10</td>
              <td>99<br />○</td>
              <td>999<br />◉</td>
              <td>¥3,000</td>
              <td>1700<br />○</td>
            </tr>
            <tr>
              <td>SEVEN STAR JAPAN</td>
              <td>★★☆☆☆</td>
              <td>💀</td>
              <td></td>
              <td>37<br />◉</td>
              <td>30<br />○</td>
              <td></td>
              <td>52<br />○</td>
            </tr>
            <tr>
              <td>SAKURA COOL JAPAN</td>
              <td>★★★☆☆</td>
              <td></td>
              <td></td>
              <td>242<br />○</td>
              <td>142<br />○</td>
              <td></td>
              <td>292<br />◉</td>
            </tr>
          </tbody>
        </table>
      </section>
    </main>
  </body>
</html>
