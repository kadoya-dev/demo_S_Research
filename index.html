<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>セラーサーチ画面</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="mode-tabs">
        <span class="mode-label">モード切替</span>
        <button class="tab tab--active">セラー（SAMURAI SHOP）</button>
        <button class="tab">ストック</button>
        <button class="tab">仕入れリスト</button>
        <button class="tab">後で仕入れる</button>
      </header>

      <section class="card">
        <h2 class="section-title">検索条件</h2>
        <p class="sub-note">※ セラー一覧に合わせた条件で絞り込み</p>

        <div class="search-grid">
          <label class="field">
            <span>ショップ名</span>
            <input type="text" value="SAKURA" />
          </label>
          <label class="field">
            <span>評価</span>
            <select>
              <option>★★★☆☆ 以上</option>
            </select>
          </label>
          <label class="field">
            <span>メモ欄</span>
            <select>
              <option>指定なし</option>
            </select>
          </label>
          <label class="field">
            <span>最終リサーチ日</span>
            <input type="date" value="2025-11-10" />
          </label>

          <label class="field">
            <span>未取扱ASIN数（ストック）</span>
            <div class="pair">
              <input type="number" value="30" />
              <small>以上</small>
            </div>
          </label>
          <label class="field">
            <span>未取扱ASIN数（仕入れたことが有る）</span>
            <div class="pair">
              <input type="number" value="20" />
              <small>以上</small>
            </div>
          </label>
          <label class="field">
            <span>単価（中央値）</span>
            <div class="pair">
              <input type="number" value="3000" />
              <small>円以下</small>
            </div>
          </label>
          <label class="field">
            <span>出品ASIN数</span>
            <div class="pair">
              <input type="number" value="50" />
              <small>以上</small>
            </div>
          </label>
        </div>
      </section>

      <section class="card">
        <h2 class="section-title">ソート条件</h2>
        <div class="sort-row">
          <button class="chip chip--active">評価</button>
          <button class="chip">最終リサーチ日</button>
          <button class="chip">未取扱ASIN数（ストック）</button>
          <button class="chip">未取扱ASIN数（仕入れたことが有る）</button>
          <button class="chip">単価（中央値）</button>
          <button class="chip">出品ASIN数</button>
        </div>
        <div class="actions">
          <button class="btn btn--sub">条件リセット</button>
          <button class="btn btn--primary">検索</button>
        </div>
      </section>

      <section class="card list-card" aria-label="セラーリサーチ一覧">
        <h2 class="section-title">セラーリサーチ一覧</h2>
        <table class="seller-table">
          <thead>
            <tr>
              <th>ショップ名</th>
              <th>評価</th>
              <th>メモ欄</th>
              <th>最終リサーチ日</th>
              <th>未取扱ASIN数<br />（ストック）</th>
              <th>未取扱ASIN数<br />（仕入れたことが有る）</th>
              <th>単価<br />（中央値）</th>
              <th>出品ASIN数</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><a href="#">SAKURA COOL JAPAN</a></td>
              <td>★★★☆☆</td>
              <td>💖</td>
              <td>2025/11/10</td>
              <td>99</td>
              <td>999</td>
              <td>¥3,000</td>
              <td>1700</td>
            </tr>
            <tr>
              <td>SEVEN STAR JAPAN</td>
              <td>★★☆☆☆</td>
              <td>💀</td>
              <td>-</td>
              <td>37</td>
              <td>30</td>
              <td>-</td>
              <td>52</td>
            </tr>
            <tr>
              <td>SAKURA COOL JAPAN</td>
              <td>★★★☆☆</td>
              <td>-</td>
              <td>-</td>
              <td>242</td>
              <td>142</td>
              <td>-</td>
              <td>292</td>
            </tr>
          </tbody>
        </table>
      </section>
    </main>
  </body>
</html>
