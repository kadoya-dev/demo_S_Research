<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>セラーサーチ画面</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="card">
        <h2 class="section-title">インポート／検索条件</h2>
        <p class="sub-note">※ 現在はダミー表示です（検索機能は未実装）</p>

        <div class="toggle-wrap" id="searchWrap">
          <button class="chip toggle-btn" type="button" id="toggleSearch" aria-expanded="false" aria-controls="searchPanel">検索条件を表示/閉じる</button>

          <div class="search-panel" id="searchPanel" hidden>
            <div class="import-box" aria-label="インポートエリア">
              <h3 class="section-title section-title--sub">インポート</h3>
              <div class="import-row">
                <div class="import-left">
                  <label class="field inline-field">
                    <span>ASIN</span>
                    <input type="text" maxlength="15" size="15" class="asin-input" placeholder="ASINを入力" />
                  </label>
                  <label class="field inline-field">
                    <span>CSV</span>
                    <input type="file" accept=".csv" />
                  </label>
                </div>
                <button class="btn btn--primary">インポート</button>
              </div>
            </div>

            <div class="search-grid">
              <h3 class="section-title section-title--sub search-grid-title">検索条件</h3>
              <label class="field"><span>ショップ名</span><input type="text" value="SAKURA" /></label>
              <label class="field"><span>セラーID</span><input type="text" value="A1TLC7SLSGY000" /></label>
              <label class="field"><span>評価</span><div class="pair"><select><option>★☆☆☆☆</option><option>★★☆☆☆</option><option selected>★★★☆☆</option><option>★★★★☆</option><option>★★★★★</option></select><small>以上</small></div></label>
              <label class="field"><span>メモ欄</span><input type="text" value="" placeholder="メモを入力" /></label>
              <label class="field"><span>最終リサーチ日</span><input type="date" value="2025-11-10" /></label>
              <div class="field checkbox-field"><span class="checkbox-field-spacer" aria-hidden="true">&nbsp;</span><label class="checkbox-inline"><input type="checkbox" aria-label="未リサーチ" /><span>未リサーチ</span></label></div>
              <label class="field"><span>未取扱ASIN数（ストック）</span><div class="pair"><input type="number" value="30" /><small>以上</small></div></label>
              <label class="field"><span>未取扱ASIN数（仕入れ有）</span><div class="pair"><input type="number" value="20" /><small>以上</small></div></label>
              <label class="field"><span>単価（中央値）</span><div class="pair"><input type="number" value="3000" /><small>円以下</small></div></label>
              <label class="field"><span>出品ASIN数</span><div class="pair"><input type="number" value="50" /><small>以上</small></div></label>
            </div>
          </div>
        </div>

        <div class="actions">
          <button class="btn btn--sub">条件リセット</button>
          <button class="btn btn--primary">検索</button>
        </div>
      </section>

      <section class="card list-card" aria-label="セラーリサーチ一覧">
        <div class="list-head">
          <h2 class="section-title">セラーリサーチ一覧</h2>
          <div class="list-head-actions">
            <button class="mini-btn mini-btn--top">更新</button>
            <button class="btn btn--go">ASINリサーチへ進む</button>
          </div>
        </div>
        <table class="seller-table" id="sellerTable">
          <thead>
            <tr>
              <th class="check-col"><span class="field-label-with-tip field-label-with-tip--header tooltip-trigger tooltip-trigger--left" tabindex="0" aria-label="ブロックの説明" data-tooltip="今後、対象セラーを表示しないようにブロックします。☑を切り替えて「更新」ボタンを押してください。">ブロック🚫<span class="tooltip-icon" aria-hidden="true">?</span></span></th>
              <th><button class="sort-button" type="button" data-sort-index="1" data-sort-type="text"><span>ショップ名</span><span class="sort-indicator" aria-hidden="true">⇅</span></button></th>
              <th><button class="sort-button" type="button" data-sort-index="2" data-sort-type="rating"><span>評価</span><span class="sort-indicator" aria-hidden="true">⇅</span></button></th>
              <th class="memo-head"><button class="sort-button" type="button" data-sort-index="3" data-sort-type="input-text"><span>メモ欄</span><span class="sort-indicator" aria-hidden="true">⇅</span></button></th>
              <th><button class="sort-button" type="button" data-sort-index="4" data-sort-type="date"><span>最終リサーチ日</span><span class="sort-indicator" aria-hidden="true">⇅</span></button></th>
              <th><button class="sort-button tooltip-trigger" type="button" data-sort-index="5" data-sort-type="number" aria-label="未取扱ASIN数（ストック）の説明。クリックで並び替え。" data-tooltip="未取扱ASIN数（ストック）=（対象セラーが出品しているASINの数）-（自分がストックリサーチに登録しているASINの数）"><span class="field-label-with-tip field-label-with-tip--header">未取扱ASIN数（ストック）<span class="tooltip-icon" aria-hidden="true">?</span></span><span class="sort-indicator" aria-hidden="true">⇅</span></button></th>
              <th><button class="sort-button tooltip-trigger" type="button" data-sort-index="6" data-sort-type="number" aria-label="未取扱ASIN数（仕入れ有）の説明。クリックで並び替え。" data-tooltip="未取扱ASIN数（仕入れ有）=（対象セラーが出品しているASINの数）-（自分が仕入れたことのあるASINの数）"><span class="field-label-with-tip field-label-with-tip--header">未取扱ASIN数（仕入れ有）<span class="tooltip-icon" aria-hidden="true">?</span></span><span class="sort-indicator" aria-hidden="true">⇅</span></button></th>
              <th><button class="sort-button" type="button" data-sort-index="7" data-sort-type="currency"><span>単価（中央値）</span><span class="sort-indicator" aria-hidden="true">⇅</span></button></th>
              <th><button class="sort-button" type="button" data-sort-index="8" data-sort-type="number"><span>出品ASIN数</span><span class="sort-indicator" aria-hidden="true">⇅</span></button></th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><input type="checkbox" aria-label="1行目を選択" /></td><td><a href="#">SAKURA COOL JAPAN</a></td><td>★★★☆☆</td><td><input class="memo-input" type="text" value="💖" /></td><td>2025/11/10</td>
              <td>99<br /><input type="radio" name="row1" aria-label="1行目 ストック99" /></td>
              <td>999<br /><input type="radio" name="row1" aria-label="1行目 仕入れ有り999" /></td>
              <td>¥3,000</td>
              <td>1700<br /><input type="radio" name="row1" aria-label="1行目 出品1700" /></td>
            </tr>
            <tr>
              <td><input type="checkbox" aria-label="2行目を選択" /></td><td>SEVEN STAR JAPAN</td><td>★★☆☆☆</td><td><input class="memo-input" type="text" value="💀" /></td><td>未</td>
              <td>37<br /><input type="radio" name="row2" aria-label="2行目 ストック37" /></td>
              <td>30<br /><input type="radio" name="row2" aria-label="2行目 仕入れ有り30" /></td>
              <td>¥4,280</td>
              <td>52<br /><input type="radio" name="row2" aria-label="2行目 出品52" /></td>
            </tr>
            <tr>
              <td><input type="checkbox" aria-label="3行目を選択" /></td><td>SAKURA COOL JAPAN</td><td>★★★☆☆</td><td><input class="memo-input" type="text" placeholder="メモ入力" /></td><td>未</td>
              <td>242<br /><input type="radio" name="row3" aria-label="3行目 ストック242" /></td>
              <td>142<br /><input type="radio" name="row3" aria-label="3行目 仕入れ有り142" /></td>
              <td>¥2,680</td>
              <td>292<br /><input type="radio" name="row3" aria-label="3行目 出品292" /></td>
            </tr>
          </tbody>
        </table>
      </section>
    </main>

    <script>
      const toggleButton = document.getElementById('toggleSearch');
      const searchPanel = document.getElementById('searchPanel');
      const searchWrap = document.getElementById('searchWrap');
      const sellerTable = document.getElementById('sellerTable');
      const sortButtons = sellerTable.querySelectorAll('.sort-button');
      const tableBody = sellerTable.querySelector('tbody');
      const radioCells = Array.from(tableBody.querySelectorAll('td')).filter((cell) => cell.querySelector('input[type="radio"]'));

      toggleButton.addEventListener('click', () => {
        const willOpen = searchPanel.hidden;
        searchPanel.hidden = !willOpen;
        toggleButton.setAttribute('aria-expanded', String(willOpen));
        searchWrap.classList.toggle('is-open', willOpen);
      });

      const getCellValue = (row, index, type) => {
        const cell = row.cells[index];

        if (!cell) return '';

        if (type === 'input-text') {
          const input = cell.querySelector('input');
          return (input?.value || input?.placeholder || '').trim().toLowerCase();
        }

        const rawText = cell.textContent.replace(/\s+/g, ' ').trim();

        if (type === 'number' || type === 'currency') {
          const numericText = rawText.replace(/[^0-9.-]/g, '');
          return numericText ? Number(numericText) : -Infinity;
        }

        if (type === 'date') {
          if (!rawText || rawText === '-' || rawText === '未') return -Infinity;
          const normalized = rawText.replace(/\//g, '-');
          const time = Date.parse(normalized);
          return Number.isNaN(time) ? -Infinity : time;
        }

        if (type === 'rating') {
          return (rawText.match(/★/g) || []).length;
        }

        return rawText.toLowerCase();
      };

      const updateSortState = (activeButton, direction) => {
        sortButtons.forEach((button) => {
          const isActive = button === activeButton;
          button.dataset.direction = isActive ? direction : 'none';
          button.setAttribute('aria-sort', isActive ? (direction === 'asc' ? 'ascending' : 'descending') : 'none');
          const indicator = button.querySelector('.sort-indicator');
          if (indicator) {
            indicator.textContent = isActive ? (direction === 'asc' ? '▲' : '▼') : '⇅';
          }
        });
      };

      radioCells.forEach((cell) => {
        cell.classList.add('radio-cell');
        cell.addEventListener('click', (event) => {
          const radio = cell.querySelector('input[type="radio"]');

          if (!radio) return;
          if (event.target instanceof HTMLInputElement && event.target.type === 'radio') return;

          radio.checked = true;
          radio.dispatchEvent(new Event('change', { bubbles: true }));
        });
      });

      sortButtons.forEach((button) => {
        button.dataset.direction = 'none';
        button.setAttribute('aria-sort', 'none');

        button.addEventListener('click', () => {
          const index = Number(button.dataset.sortIndex);
          const type = button.dataset.sortType;
          const nextDirection = button.dataset.direction === 'asc' ? 'desc' : 'asc';
          const rows = Array.from(tableBody.querySelectorAll('tr'));

          rows.sort((rowA, rowB) => {
            const valueA = getCellValue(rowA, index, type);
            const valueB = getCellValue(rowB, index, type);

            if (valueA === valueB) return 0;
            if (valueA > valueB) return nextDirection === 'asc' ? 1 : -1;
            return nextDirection === 'asc' ? -1 : 1;
          });

          tableBody.append(...rows);
          updateSortState(button, nextDirection);
        });
      });
    </script>
  </body>
</html>
